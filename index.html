<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="manifest" href="manifest.json">

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Routine quotidienne</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
.container { max-width:900px; margin:auto; padding:20px; }
.score { background:#fff; padding:10px; border-radius:8px; margin-bottom:10px; }
.top-bar { display:flex; gap:10px; margin-bottom:10px; }
.btn { padding:8px 12px; border:1px solid #ddd; border-radius:6px; background:#f7f7f7; cursor:pointer; }
.card { background:#fff; padding:15px; border-radius:10px; margin-bottom:15px; }
.time { display:flex; justify-content:space-between; margin-bottom:10px; gap:10px; }
.emoji-inline { display:flex; gap:4px; }
.status-row { display:flex; gap:10px; margin-bottom:10px; }
.status-box { flex:1; padding:10px; border:1px solid #ddd; border-radius:8px; display:flex; justify-content:space-between; }
.notes { margin-top:10px; }
.note-item { display:flex; justify-content:space-between; background:#fafafa; padding:6px; margin-bottom:5px; border-radius:6px; }
.note-input { display:flex; gap:5px; margin-top:8px; }
.time-edit-input { border:1px solid #ddd; padding:4px; border-radius:6px; }
.time-actions { display:flex; gap:5px; }
</style>
</head>

<body>

<div class="container">
<div id="score" class="score"></div>

<div class="top-bar">
<button class="btn" onclick="resetWeekEmojis()">Effacer emoji</button>
<button class="btn" onclick="resetAll()">Réinitialiser tout</button>
</div>

<div id="blocks"></div>
</div>

<script>

let TIME_EDITING = false;

const DEFAULT_NOTES = [
"apprendre, lire, copier...",
"lire le coran...",
"faire correctement les choses"
];

const BLOCKS = [
"05:00–09:00","09:00–13:00","13:00–15:40",
"15:40–18:20","18:20–19:50","19:50–23:00","23:00–05:00"
];

const STATE_KEY="routine_state";
const EMOJI_KEY="routine_emojis";
const SCORE_KEY="routine_score";
const NOTES_KEY="routine_notes";

function load(k,f){return JSON.parse(localStorage.getItem(k)||JSON.stringify(f));}
function save(k,v){localStorage.setItem(k,JSON.stringify(v));}

function getScore(){return load(SCORE_KEY,{fort:0,faible:0});}
function updateScore(t){const s=getScore();s[t]++;save(SCORE_KEY,s);}

function addEmoji(b,e){
const em=load(EMOJI_KEY,{});
if(!em[b]) em[b]=[];
em[b].push(e);
save(EMOJI_KEY,em);
}

function getNotes(block){
const notes=load(NOTES_KEY,{});
if(!notes[block]){
notes[block]= block==="23:00–05:00"
? ["Dormir correctement."]
: [...DEFAULT_NOTES];
save(NOTES_KEY,notes);
}
return notes[block];
}

function addNote(b,t){
const n=load(NOTES_KEY,{});
if(!n[b]) n[b]=[...DEFAULT_NOTES];
n[b].push(t);
save(NOTES_KEY,n);
}

function deleteNote(b,i){
const n=load(NOTES_KEY,{});
if(!n[b]) return;
n[b].splice(i,1);
save(NOTES_KEY,n);

if(!TIME_EDITING) render();
}

function setStatus(b,v){
const s=load(STATE_KEY,{});
s[b]=v;
updateScore(v==="Fort"?"fort":"faible");
addEmoji(b,v==="Fort"?"✅":"❌");
save(STATE_KEY,s);

if(!TIME_EDITING) render();
}

function resetWeekEmojis(){localStorage.removeItem(EMOJI_KEY);render();}
function resetAll(){localStorage.clear();render();}

/* ===== HORAIRES PATCH ===== */

function getActiveBlocks(){
return load("routine_blocks_custom",null)||BLOCKS;
}

function saveBlocks(b){save("routine_blocks_custom",b);}

function enableTimeEdit(span,index){
TIME_EDITING=true;

const old=span.innerText;
const parent=span.parentNode;

const input=document.createElement("input");
input.value=old;
input.className="time-edit-input";

const actions=document.createElement("div");
actions.className="time-actions";

const ok=document.createElement("button");
ok.innerText="Valider";

const cancel=document.createElement("button");
cancel.innerText="Annuler";

ok.onclick=()=>{
const blocks=getActiveBlocks();
blocks[index]=input.value;
saveBlocks(blocks);

TIME_EDITING=false;
render();
};

cancel.onclick=()=>{
input.remove();
actions.remove();
span.style.display="";
TIME_EDITING=false;
};

actions.appendChild(ok);
actions.appendChild(cancel);

span.style.display="none";
parent.insertBefore(input, span.nextSibling);
parent.insertBefore(actions, input.nextSibling);
}

/* Listener corrigé */
document.addEventListener("dblclick", (e) => {
const target = e.target;

if (!target.matches('[data-editable="time"]')) return;
if (target.closest(".notes") || target.closest(".note-input")) return;

enableTimeEdit(target, parseInt(target.dataset.index));
});

/* ===== RENDER ===== */

function render(){
const container=document.getElementById("blocks");
const score=getScore();
const emojis=load(EMOJI_KEY,{});
const blocks=getActiveBlocks();

container.innerHTML="";

blocks.forEach((block,i)=>{
const notes=getNotes(block);
const history=emojis[block]||[];

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="time">
<span data-editable="time" data-index="${i}">${block}</span>
<span class="emoji-inline">
${history.map(e=>`<span>${e}</span>`).join("")}
</span>
</div>

<div class="status-row">
<div class="status-box">
<span>Fort</span>
<input type="checkbox" onchange="setStatus('${block}','Fort')">
</div>
<div class="status-box">
<span>Faible</span>
<input type="checkbox" onchange="setStatus('${block}','Faible')">
</div>
</div>

<div class="notes">
${notes.map((n,i)=>`
<div class="note-item">
<span>${n}</span>
<button onclick="deleteNote('${block}',${i})">note${i+1}</button>
</div>`).join("")}

<div class="note-input">
<input id="input-${block}">
<button onclick="addNoteUI('${block}')">Ajouter</button>
</div>
</div>
`;

container.appendChild(card);
});

document.getElementById("score").innerHTML=`
<div>✅ Fort</div>
<div>❌ Faible</div>
<div>🏆 Score : ✅ ${score.fort} - ❌ ${score.faible}</div>
`;
}

function addNoteUI(b){
const input=document.getElementById("input-"+b);
const v=input.value.trim();
if(!v) return;

addNote(b,v);
input.value="";

if(!TIME_EDITING) render();
}

render();

</script>
</body>
</html>
